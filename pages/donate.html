<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashavan</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/about_styles.css">
  <!-- Link Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Additional inline styles to ensure image layout matches the removed text section */
    .image-replacement-section {
      margin: 2rem auto;
      max-width: 100%;
      text-align: center;
    }
    .image-replacement-section img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      display: block;
      margin: 0 auto;
    }
    /* preserve original spacing and font styles */
    .pt-serif-regular {
      font-family: 'PT Serif', serif;
      font-weight: 400;
    }
    .abouttxt {
      font-family: 'PT Serif', serif;
      font-weight: 700;
      text-align: center;
    }
    .page-content {
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 20px;
    }
    /* ensure consistent text styling for belief section */
    .belief-text {
      text-align: center;
      max-width: 120%;
      margin: 0 auto;
    }
    footer img {
      display: block;
      width: 100%;
      height: 120%;
      object-fit: cover;
    }
  </style>
</head>

<body>
<div id="header"></div>

<main class="page-content">
    <h1 class="abouttxt" style="margin-top: 40px;">Donate Us</h1>
   
    <div class="pt-serif-regular image-replacement-section" style="text-align: center; max-width: 120%; margin: 0 auto;">
      <img src="../assets/images/donate.jpeg" alt="Ashavan movement - compassion and kindness" style="width:100%; max-width:1000px; border-radius:16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    </div>
</main>

<p style="margin-bottom: 150px; color: white;">This is text</p>

<!-- Replaced dynamic footer with static image footer -->
<footer>
  <img src="../assets/images/footer.png" alt="Footer Image" width="100%" height="120%"> 
</footer>

<script>
  fetch('header.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('header').innerHTML = data;
      // IMPORTANT: reattach navbar JS after loading
      initNavbar();
    })
    .catch(err => console.warn('Header fetch failed:', err));

  function initNavbar() {
    const toggle = document.querySelector('.nav-toggle');
    const sidenav = document.getElementById('mySidenav');
    const closeBtn = document.querySelector('.closebtn');
    const overlay = document.querySelector('.nav-overlay');

    if (!toggle || !sidenav || !closeBtn || !overlay) {
      console.warn('Navbar elements not found, possibly header missing expected classes');
      return;
    }

    function openNav() {
      sidenav.classList.add('open');
      overlay.classList.add('visible');
      toggle.setAttribute('aria-expanded', 'true');
    }

    function closeNav() {
      sidenav.classList.remove('open');
      overlay.classList.remove('visible');
      toggle.setAttribute('aria-expanded', 'false');
    }

    toggle.addEventListener('click', openNav);
    closeBtn.addEventListener('click', closeNav);
    overlay.addEventListener('click', closeNav);
  }
</script>
</body>
</html>
