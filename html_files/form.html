<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/about_styles.css">
  <!-- Link Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
<div id="header"></div>

<main class="page-content">

    <h1 class="abouttxt" style="margin-top: 40px;">Volunteer Form</h1>
   
<div class="pt-serif-regular" style="text-align: center; max-width: 120%; margin: 0 auto;">

  <p>please fulfil this form </p>

</div>



 
</main>

  <div>
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdeckhwK988XKNSDoZy2_mnKKSSqkromjD3vFB7CLBu50U7kA/viewform?usp=sharing&ouid=101832396232634258990"
    width="100%"
    height="800"
    frameborder="0">
  </iframe>
</div>




<p style="margin-bottom: 150px; color: white;">This is text</p>

<div id="footer"></div>



<script>
  fetch('footer.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('footer').innerHTML = data;
    });
</script>

<script>
  fetch('header.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('header').innerHTML = data;

      // IMPORTANT: reattach navbar JS after loading
      initNavbar();
    });


  function initNavbar() {
    const toggle = document.querySelector('.nav-toggle');
    const sidenav = document.getElementById('mySidenav');
    const closeBtn = document.querySelector('.closebtn');
    const overlay = document.querySelector('.nav-overlay');

    function openNav() {
      sidenav.classList.add('open');
      overlay.classList.add('visible');
      toggle.setAttribute('aria-expanded', 'true');
    }

    function closeNav() {
      sidenav.classList.remove('open');
      overlay.classList.remove('visible');
      toggle.setAttribute('aria-expanded', 'false');
    }

    toggle.addEventListener('click', openNav);
    closeBtn.addEventListener('click', closeNav);
    overlay.addEventListener('click', closeNav);
  }
</script>

</body>
</html>
